# Dependency review

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
      linting:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "typescript-eslint"
          - "prettier"
      build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "@types/node"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
