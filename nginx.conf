server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /favicon.svg {
    access_log off;
  }

  location ~* \.(?:css|js|mjs|svg|ico|png|jpg|jpeg|gif|webp|avif|woff2?)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
